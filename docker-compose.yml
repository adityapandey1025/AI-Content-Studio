services:
  ai-content-studio:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:80"
    environment:
      - NODE_ENV=production
      - PORT=80
      - OPENROUTER_API_KEY
      - OPENROUTER_MODEL
      - OPENROUTER_BASE_URL
      - OPENROUTER_APP_NAME
      - OPENROUTER_APP_URL
      - CORS_ORIGIN
      - RATE_LIMIT_WINDOW_MS
      - RATE_LIMIT_MAX
    restart: unless-stopped

